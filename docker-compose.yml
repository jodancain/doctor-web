version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: goutcare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-goutcare123}
      MYSQL_DATABASE: goutcare
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: goutcare-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-goutcare123}@mysql:3306/goutcare
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: info

volumes:
  mysql_data:
