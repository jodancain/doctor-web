worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;  # 配合图片上传 10MB 限制

    # Gzip
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ===== HTTP → HTTPS 重定向 + Let's Encrypt 验证 =====
    server {
        listen 80;
        server_name yundongyl.cn www.yundongyl.cn;

        # Let's Encrypt 验证路径
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其余全部 301 跳转 HTTPS
        location / {
            return 301 https://yundongyl.cn$request_uri;
        }
    }

    # ===== HTTPS 主站 =====
    server {
        listen 443 ssl;
        server_name yundongyl.cn www.yundongyl.cn;

        # SSL 证书路径（由 certbot 自动生成）
        ssl_certificate     /etc/letsencrypt/live/yundongyl.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yundongyl.cn/privkey.pem;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 上传文件静态服务（Nginx 直接提供，不经过 Node.js）
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            access_log off;
        }

        # API + 前端全部代理到 Node.js
        location / {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # SSE 支持（AI 对话流式输出）
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
